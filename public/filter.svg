<svg xmlns="http://www.w3.org/2000/svg" version="1.1">
  <defs>
    <filter id="goth-filter">
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.4" intercept="0"/>
        <feFuncG type="linear" slope="0.15" intercept="0"/>
        <feFuncB type="linear" slope="0.6" intercept="0.05"/>
      </feComponentTransfer>
      <feColorMatrix type="saturate" values="0.3"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.8" intercept="-0.2"/>
        <feFuncG type="linear" slope="1.2" intercept="-0.1"/>
        <feFuncB type="linear" slope="2.2" intercept="-0.1"/>
      </feComponentTransfer>
    </filter>
    <filter id="anime-filter">
      <feComponentTransfer>
        <feFuncR type="discrete" tableValues="0 0.25 0.55 1"/>
        <feFuncG type="discrete" tableValues="0 0.2 0.6 1"/>
        <feFuncB type="discrete" tableValues="0.1 0.4 0.75 1"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>
</svg>
